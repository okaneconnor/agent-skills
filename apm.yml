name: agent-skills
version: 2.2.0
description: >
  A curated collection of agent skills for AI coding assistants — Jira story
  authoring via the Atlassian MCP, codebase architecture diagramming via the
  Excalidraw MCP, and branch-scoped security review covering application code
  and cloud / IaC (Azure, AWS, Kubernetes, Terraform). Install all bundles at
  once or pick individual ones.
author: okaneconnor
license: MIT
target: all

dependencies:
  apm:
    - okaneconnor/agent-skills/packages/jira
    - okaneconnor/agent-skills/packages/diagramming
    - okaneconnor/agent-skills/packages/security
